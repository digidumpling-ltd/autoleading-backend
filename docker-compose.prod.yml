services:
    app:
        build:
            context: .
            dockerfile: docker/production/Dockerfile
        image: bagisto-app:prod
        env_file:
            - ./.env.production
        volumes:
            - app-storage:/var/www/html/storage
            - app-public:/var/www/html/public
        depends_on:
            - mysql
            - redis
    nginx:
        image: nginx:1.25-alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - app-public:/var/www/html/public:ro
            - ./docker/production/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./docker/production/certs:/etc/nginx/certs:ro
        depends_on:
            - app
    mysql:
        image: mysql/mysql-server:8.0
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_HOST: "%"
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ALLOW_EMPTY_PASSWORD: 0
        volumes:
            - mysql-data:/var/lib/mysql
        ports:
            - "3306:3306"
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - -p${DB_PASSWORD}
            retries: 3
            timeout: 5s
    redis:
        image: redis:alpine
        volumes:
            - redis-data:/data
        ports:
            - "6379:6379"
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

volumes:
    app-storage:
        driver: local
    app-public:
        driver: local
    mysql-data:
        driver: local
    redis-data:
        driver: local
