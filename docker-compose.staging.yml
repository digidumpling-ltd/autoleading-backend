services:
    app_staging:
        build:
            context: .
            dockerfile: docker/staging.Dockerfile
            args:
                user: developer
                uid: 1000
        image: bagisto-staging-app
        container_name: bagisto-staging-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - sail_staging
        env_file:
            - .env.staging

    web_staging:
        image: nginx:alpine
        container_name: bagisto-staging-nginx
        restart: unless-stopped
        ports:
            - "${STAGING_PORT:-8888}:80"
        volumes:
            - .:/var/www:ro
            - ./docker/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - sail_staging
        depends_on:
            - app_staging

    mysql_staging:
        image: 'mysql/mysql-server:8.0'
        container_name: bagisto-staging-db
        ports:
            - '${FORWARD_DB_PORT:-33061}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-bagisto_password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE:-bagisto_staging}'
            MYSQL_USER: '${DB_USERNAME:-bagisto}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-bagisto_password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql-staging:/var/lib/mysql'
        networks:
            - sail_staging
        env_file:
            - .env.staging

networks:
    sail_staging:
        driver: bridge

volumes:
    sail-mysql-staging:
        driver: local
